<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Maintenance</title>
    <style>
        /* Apple System UI Style */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #000; /* Deep black for focus */
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        .alert-box { 
            background: rgba(255, 255, 255, 0.95); 
            width: 275px; 
            border-radius: 14px; 
            text-align: center; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(1.1); } to { opacity: 1; transform: scale(1); } }
        .padding { padding: 20px; }
        .title { font-weight: 600; font-size: 17px; margin-bottom: 4px; color: #000; }
        .text { font-size: 13px; color: #333; line-height: 1.4; }
        .btn { 
            border-top: 0.5px solid #c8c8c8; 
            color: #007aff; 
            text-decoration: none; 
            display: block; 
            padding: 12px; 
            font-size: 17px; 
            font-weight: 500; 
            cursor: pointer; 
            background: none; 
            border-left: none;
            border-right: none;
            border-bottom: none;
            width: 100%;
        }
        .btn:active { background: #e5e5e5; border-radius: 0 0 14px 14px; }
    </style>
</head>
